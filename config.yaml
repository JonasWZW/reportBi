app:
  name: "smart-report-bi"
  version: "0.1.0"
  host: "0.0.0.0"
  port: 8000
  debug: false

# LLM 配置
llm:
  provider: "openai"  # openai | anthropic
  model: "gpt-4o"
  temperature: 0.7
  api_key: "${OPENAI_API_KEY}"

# Embedding 配置
embedding:
  provider: "sentence-transformers"  # sentence-transformers | openai
  model: "all-MiniLM-L6-v2"
  device: "cpu"  # cpu | cuda

# 向量存储配置
vector_store:
  type: "faiss"  # faiss | redis
  index_path: "./storage/vector_store"
  dimension: 384

# 大数据平台 API 配置
data_platform:
  base_url: "${DATA_PLATFORM_BASE_URL}"
  api_key: "${DATA_PLATFORM_API_KEY}"
  timeout: 30

# 缓存配置
cache:
  type: "redis"  # redis | memory
  host: "localhost"
  port: 6379
  db: 0
  ttl: 3600

# 预制件存储
blocks:
  storage_type: "file"  # file | database
  storage_path: "./storage/blocks"

# 模板存储
templates:
  storage_type: "file"  # file | database
  storage_path: "./storage/templates"
  built_in_path: "./templates"

# 数据库配置
database:
  url: "sqlite:///./storage/report_bi.db"

# 认证配置
auth:
  secret_key: "${AUTH_SECRET_KEY}"
  algorithm: "HS256"
  access_token_expire_minutes: 30

# 工具注册表初始工具
tool_registry:
  initial_tools:
    - asset_attacks
    - threat_stats
    - vulnerability_scan
    - log_query
    - network_flow
